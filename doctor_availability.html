{% extends 'navigationbar.html' %}
{% load static %}
{% block body %}
<body class="doctor-bg">

<div class='container page-container'>
    <h2 class='text-center'>My Availability</h2>
    <br>
    {% if success %}
    <div class="alert alert-success">Slot added.</div>
    {% endif %}
    <div class="card" style="max-width:520px; margin:0 auto;">
        <form method="post">
            {% csrf_token %}
            <label>Date</label>
            <input type="date" name="date" class="form-control" required>
            <label>Time</label>
            <input type="time" name="time" class="form-control" required>
            <br>
            <input type="submit" value="Add Slot" class="form-control btn btn-primary">
        </form>
    </div>

    <div class="card mt-4">
        <h4>Your Slots</h4>
        <table class="table table-hover" id="example">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody>
                {% for s in slots %}
                <tr>
                    <td>{{ s.date }}</td>
                    <td>{{ s.time }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="2">No slots yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
