<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cookies Data</title>
 <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #56ab2f, #a8e063);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            width: 1000px;
            color: #fff;
        }

        .container h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h3 {
            margin-top: 0;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }

        .item:last-child {
            border-bottom: none;
        }

        a {
            display: inline-block;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            text-align: center;
            transition: 0.3s;
        }

        a:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .visits {
            text-align: center;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cookies</h2>

        <div class="card">
            <h3>cookies Data</h3>
            {% comment %} {% for key, value in session_data.items %} {% endcomment %}
            {% for key, value in cookies.items %}
            <div class="item">
                <span>{{ key }}</span>
                <span>{{ value }}</span>
            </div>
            {% empty %}
            <div class="item">No cookies found</div>
            {% endfor %}
        </div>

        <a href="/session/">Go to Session Page</a>
    </div>
</body>
</html>
