{% extends 'navigationbar.html' %}
{% block body %}
<div class="container page-container" style="max-width:500px;">
    <h2 class="text-center">Reject Appointment</h2>
    <br>
    <p>Are you sure you want to <b>reject</b> this appointment?</p>

    <ul>
        <li><b>Patient:</b> {{ appointment.patient.name }}</li>
        <li><b>Date:</b> {{ appointment.date1 }}</li>
        <li><b>Time:</b> {{ appointment.time1 }}</li>
    </ul>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Reject</button>
        <a href="{% url 'doctor_appointments' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
