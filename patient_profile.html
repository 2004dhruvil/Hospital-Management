{% extends 'navigationbar.html' %}
{% load static %}
{% block body %}
<body class="add-patient-bg">

<div class="container page-container" style="max-width:520px;">
    <h2 class="text-center">My Profile</h2>
    <br>
    {% if success %}
    <div class="alert alert-success">Profile updated.</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <label>Name</label>
        <input name="name" class="form-control" value="{{ patient.name }}" required>

        <label>Gender</label>
        <select name="gender" class="form-control" required>
            <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
        </select>

        <label>Mobile</label>
        <input name="mobile" class="form-control" value="{{ patient.mobile }}">

        <label>Address</label>
        <input name="address" class="form-control" value="{{ patient.address }}" required>

        <br>
        <input type="submit" value="Save" class="form-control btn btn-primary">
    </form>
</div>

{% endblock %}
